<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="theme-color" content="#ffbb08"/>
  <meta name="description" content="Accede a tu portal de alumno en CEART — Centro Educativo y Artístico Johann Sebastian Bach."/>
  <meta property="og:title" content="Acceder — CEART"/>
  <meta property="og:description" content="Inicia sesión o crea tu cuenta en el portal de alumnos de CEART."/>
  <meta property="og:type" content="website"/>
  <meta property="og:image" content="assets/logo.jpg"/>
  <title>Acceder — CEART</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" href="assets/logo.jpg" type="image/jpeg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,300;1,6..72,400&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── TOKENS ── */
:root{
  --ink:#010101;
  --gold:#ffbb08;
  --gold-d:#d9a000;
  --gold-pale:rgba(255,187,8,.1);
  --gold-ring:rgba(255,187,8,.22);
  --canvas:#fffcfc;
  --surface:#ffffff;
  --rule:rgba(1,1,1,.08);
  --muted:#787774;
  --faint:#b5b3af;
  --err:#b91c1c;
  --err-bg:#fef2f2;
  --err-border:#fecaca;
  --suc:#15803d;
  --suc-bg:#f0fdf4;
  --suc-border:#bbf7d0;
  --serif:'Newsreader',Georgia,serif;
  --sans:'Figtree','Helvetica Neue',sans-serif;
  --ease:cubic-bezier(.16,1,.3,1);
}

html{-webkit-font-smoothing:antialiased}
body{
  font-family:var(--sans);
  background:var(--canvas);
  color:var(--ink);
  min-height:100dvh;
  display:flex;flex-direction:column;
  line-height:1.6;
}

/* ── AMBIENT ── */
.ambient{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 55% at 15% 5%,rgba(255,187,8,.04) 0%,transparent 60%),
             radial-gradient(ellipse 50% 45% at 85% 90%,rgba(255,187,8,.025) 0%,transparent 55%);
}

/* ── HEADER ── */
header{
  position:relative;z-index:10;
  padding:20px clamp(20px,5vw,40px);
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--rule);
  background:rgba(255,252,252,.9);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.back{
  display:inline-flex;align-items:center;gap:7px;
  text-decoration:none;color:var(--muted);
  font-size:12px;font-weight:600;letter-spacing:.2px;
  transition:color .18s var(--ease);
}
.back:hover{color:var(--ink)}
.back svg{width:14px;height:14px;transition:transform .2s var(--ease)}
.back:hover svg{transform:translateX(-2px)}
.hdr-brand{display:flex;align-items:center;gap:9px;text-decoration:none}
.hdr-brand img{
  width:30px;height:30px;border-radius:7px;
  object-fit:contain;border:1px solid var(--rule);
}
.hdr-brand-name{font-family:var(--sans);font-size:13px;font-weight:700;color:var(--ink);letter-spacing:-.2px}
.hdr-brand-sub{font-size:10px;color:var(--faint);font-weight:400;display:block;line-height:1}

/* ── MAIN ── */
main{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:clamp(32px,6vw,56px) 20px;
  position:relative;z-index:1;
}

/* ── CARD ── */
.card{
  width:100%;max-width:400px;
  background:var(--surface);
  border:1px solid rgba(1,1,1,.08);
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 2px 32px rgba(1,1,1,.05);
  animation:card-in .55s var(--ease) both;
}
@keyframes card-in{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:none}
}

/* card top bar */
.card-bar{
  background:#f7f6f3;
  border-bottom:1px solid var(--rule);
  padding:10px 16px;
  display:flex;align-items:center;gap:6px;
}
.card-dot{width:9px;height:9px;border-radius:50%;background:rgba(1,1,1,.1)}

/* card body */
.card-body{padding:32px 32px 28px}

/* card identity */
.card-id{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.card-logo{
  width:44px;height:44px;border-radius:10px;
  background:var(--ink);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.card-logo img{width:32px;height:32px;object-fit:contain;border-radius:6px}
.card-title{
  font-family:var(--serif);
  font-size:22px;font-weight:400;font-style:italic;
  color:var(--ink);line-height:1.05;letter-spacing:-.01em;
}
.card-sub{font-size:12px;color:var(--muted);margin-top:2px}

/* ── TABS ── */
.tabs{
  display:flex;
  background:#f7f6f3;
  border:1px solid var(--rule);
  border-radius:8px;padding:3px;
  margin-bottom:24px;gap:3px;
}
.tab{
  flex:1;text-align:center;padding:8px 12px;
  border-radius:6px;
  font-size:12px;font-weight:600;
  color:var(--muted);
  cursor:pointer;border:none;
  background:transparent;
  font-family:var(--sans);
  transition:color .18s var(--ease),background .18s var(--ease),box-shadow .18s;
  letter-spacing:.1px;
}
.tab.active{
  background:var(--surface);
  color:var(--ink);
  box-shadow:0 1px 4px rgba(1,1,1,.07);
}
.tab:not(.active):hover{color:var(--ink)}

/* ── ALERTS ── */
.alert{
  padding:11px 14px;border-radius:8px;
  font-size:12px;font-weight:600;
  margin-bottom:16px;
  display:none;align-items:flex-start;gap:8px;
  line-height:1.5;
}
.alert.show{display:flex}
.alert-err{background:var(--err-bg);color:var(--err);border:1px solid var(--err-border)}
.alert-ok{background:var(--suc-bg);color:var(--suc);border:1px solid var(--suc-border)}

/* ── FORM PANELS ── */
.form-panel{display:none}
.form-panel.active{display:block}

/* ── FIELDS ── */
.field{margin-bottom:16px}
label{
  display:block;font-size:11px;font-weight:600;
  color:var(--ink);margin-bottom:6px;
  letter-spacing:.3px;text-transform:uppercase;
}
input{
  width:100%;
  padding:11px 14px;
  border:1px solid rgba(1,1,1,.12);
  border-radius:7px;
  font-size:14px;
  font-family:var(--sans);
  color:var(--ink);
  background:var(--surface);
  transition:border-color .2s var(--ease),box-shadow .2s var(--ease);
  outline:none;
}
input:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px var(--gold-ring);
}
input.error{border-color:var(--err)}
input::placeholder{color:var(--faint)}
.field-err{font-size:11px;color:var(--err);margin-top:4px;display:none;font-weight:600}
.field-err.show{display:block}

/* password toggle */
.pw-wrap{position:relative}
.pw-toggle{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  color:var(--faint);padding:4px;
  display:flex;
  transition:color .15s,opacity .15s;
}
.pw-toggle:hover{color:var(--muted)}
.pw-toggle[aria-pressed="true"]{color:var(--muted);opacity:1}
.pw-toggle[aria-pressed="false"]{opacity:.6}
.pw-wrap input{padding-right:42px}

/* forgot */
.forgot{
  display:block;text-align:right;
  font-size:11px;font-weight:600;color:var(--muted);
  text-decoration:none;
  margin-top:-10px;margin-bottom:16px;
  transition:color .18s;
}
.forgot:hover{color:var(--ink)}

/* ── BUTTONS ── */
.btn-submit{
  width:100%;padding:12px 18px;
  background:var(--ink);color:var(--canvas);
  border:none;border-radius:6px;
  font-size:13px;font-weight:600;font-family:var(--sans);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:background .18s,transform .15s;
  margin-bottom:14px;
  position:relative;
}
.btn-submit:hover{background:#1a1a1a}
.btn-submit:active{transform:scale(.98)}
.btn-submit:disabled{opacity:.45;cursor:not-allowed;transform:none}

.btn-google{
  width:100%;padding:11px 18px;
  background:var(--surface);color:var(--ink);
  border:1px solid rgba(1,1,1,.12);border-radius:6px;
  font-size:13px;font-weight:600;font-family:var(--sans);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:9px;
  transition:border-color .18s,background .18s,transform .15s;
}
.btn-google:hover{border-color:rgba(1,1,1,.22);background:#f9f8f6}
.btn-google:active{transform:scale(.98)}
.btn-google svg{width:17px;height:17px;flex-shrink:0}

/* ── DIVIDER ── */
.divider{
  display:flex;align-items:center;gap:10px;
  margin:14px 0;
  color:var(--faint);font-size:11px;font-weight:600;
  letter-spacing:.5px;text-transform:uppercase;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--rule)}

/* ── SPINNER ── */
.spinner{
  width:15px;height:15px;
  border:1.5px solid rgba(255,252,252,.3);
  border-top-color:var(--canvas);
  border-radius:50%;
  animation:spin .65s linear infinite;
  display:none;
}
.btn-submit.loading .spinner{display:block}
.btn-submit.loading .btn-text{display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FOOTER ── */
footer{
  position:relative;z-index:1;
  text-align:center;padding:20px;
  font-size:11px;color:var(--faint);
  border-top:1px solid var(--rule);
}
footer a{color:var(--muted);text-decoration:none;font-weight:600;transition:color .15s}
footer a:hover{color:var(--ink)}

/* ── FOCUS ── */
:focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:4px}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .card-body{padding:24px 22px 22px}
  .card-title{font-size:20px}
}

/* ── REDUCED MOTION ── */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
}
  </style>
</head>
<body>

<div class="ambient" aria-hidden="true"></div>

<!-- hidden SVG sprite -->
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <symbol id="icon-google" viewBox="0 0 24 24">
    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
  </symbol>
</svg>

<!-- ══ HEADER ══ -->
<header>
  <a href="index.html" class="back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Volver
  </a>
  <a href="index.html" class="hdr-brand">
    <img src="assets/logo.jpg" alt="CEART"/>
    <div>
      <span class="hdr-brand-name">CEART</span>
      <span class="hdr-brand-sub">Johann Sebastian Bach</span>
    </div>
  </a>
</header>

<!-- ══ MAIN ══ -->
<main>
  <div class="card">

    <!-- faux window chrome -->
    <div class="card-bar">
      <span class="card-dot"></span>
      <span class="card-dot"></span>
      <span class="card-dot"></span>
    </div>

    <div class="card-body">

      <!-- identity -->
      <div class="card-id">
        <div class="card-logo">
          <img src="assets/logo.jpg" alt="CEART"/>
        </div>
        <div>
          <div class="card-title">Bienvenido</div>
          <div class="card-sub">Portal de alumnos y maestros</div>
        </div>
      </div>

      <!-- tabs -->
      <div class="tabs" role="tablist">
        <button class="tab active" role="tab" data-tab="login" onclick="switchTab('login')">Iniciar sesión</button>
        <button class="tab" role="tab" data-tab="register" onclick="switchTab('register')">Registrarse</button>
      </div>

      <!-- alerts -->
      <div id="alert" class="alert alert-err" role="alert">
        <span id="alert-msg"></span>
      </div>
      <div id="alert-ok" class="alert alert-ok" role="status">
        <span id="alert-ok-msg"></span>
      </div>

      <!-- ── LOGIN PANEL ── -->
      <div id="panel-login" class="form-panel active">
        <form id="form-login" novalidate>
          <div class="field">
            <label for="login-email">Correo electrónico</label>
            <input type="email" id="login-email" placeholder="tu@correo.com" autocomplete="email" required/>
            <span class="field-err" id="err-login-email"></span>
          </div>
          <div class="field">
            <label for="login-pw">Contraseña</label>
            <div class="pw-wrap">
              <input type="password" id="login-pw" placeholder="Tu contraseña" autocomplete="current-password" required/>
              <button type="button" class="pw-toggle" onclick="togglePw('login-pw',this)" aria-label="Mostrar contraseña" aria-pressed="false">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="field-err" id="err-login-pw"></span>
          </div>
          <a href="#" class="forgot" onclick="handleForgot(event)">¿Olvidaste tu contraseña?</a>
          <button type="submit" class="btn-submit" id="btn-login">
            <span class="btn-text">Iniciar sesión</span>
            <div class="spinner"></div>
          </button>
        </form>

        <div class="divider">o continúa con</div>

        <button class="btn-google" onclick="loginGoogle()">
          <svg width="17" height="17"><use href="#icon-google"/></svg>
          Continuar con Google
        </button>
      </div>

      <!-- ── REGISTER PANEL ── -->
      <div id="panel-register" class="form-panel">
        <form id="form-register" novalidate>
          <div class="field">
            <label for="reg-name">Nombre completo</label>
            <input type="text" id="reg-name" placeholder="María García" autocomplete="name" required/>
            <span class="field-err" id="err-reg-name"></span>
          </div>
          <div class="field">
            <label for="reg-email">Correo electrónico</label>
            <input type="email" id="reg-email" placeholder="tu@correo.com" autocomplete="email" required/>
            <span class="field-err" id="err-reg-email"></span>
          </div>
          <div class="field">
            <label for="reg-pw">Contraseña</label>
            <div class="pw-wrap">
              <input type="password" id="reg-pw" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required minlength="8"/>
              <button type="button" class="pw-toggle" onclick="togglePw('reg-pw',this)" aria-label="Mostrar contraseña" aria-pressed="false">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="field-err" id="err-reg-pw"></span>
          </div>
          <button type="submit" class="btn-submit" id="btn-register">
            <span class="btn-text">Crear cuenta</span>
            <div class="spinner"></div>
          </button>
        </form>

        <div class="divider">o regístrate con</div>

        <button class="btn-google" onclick="loginGoogle()">
          <svg width="17" height="17"><use href="#icon-google"/></svg>
          Continuar con Google
        </button>
      </div>

    </div><!-- /card-body -->
  </div><!-- /card -->
</main>

<!-- ══ FOOTER ══ -->
<footer>
  <p>Al continuar, aceptas los <a href="#">Términos de uso</a> de CEART.</p>
</footer>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import {
    getAuth,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    signInWithPopup,
    GoogleAuthProvider,
    sendPasswordResetEmail,
    updateProfile,
    onAuthStateChanged
  } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey:            "AIzaSyA2T-sgRasaOVjvFNogYJUp_PjfiIObkUs",
    authDomain:        "ceart-app.firebaseapp.com",
    projectId:         "ceart-app",
    storageBucket:     "ceart-app.firebasestorage.app",
    messagingSenderId: "510352925375",
    appId:             "1:510352925375:web:cca20fa3ee6cb795601c0a"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const gProvider = new GoogleAuthProvider();

  onAuthStateChanged(auth, user => {
    if (user) window.location.href = 'dashboard.html';
  });

  function showAlert(msg, type) {
    document.querySelectorAll('.alert').forEach(el => el.classList.remove('show'));
    if (type === 'err') {
      document.getElementById('alert-msg').textContent = msg;
      document.getElementById('alert').classList.add('show');
    } else if (type === 'ok') {
      document.getElementById('alert-ok-msg').textContent = msg;
      document.getElementById('alert-ok').classList.add('show');
    }
  }
  function clearAlerts() { showAlert('', null); }

  function setLoading(btn, on) {
    btn.classList.toggle('loading', on);
    btn.disabled = on;
  }

  function firebaseErrMsg(code) {
    const map = {
      'auth/user-not-found':         'No existe una cuenta con ese correo.',
      'auth/wrong-password':         'Contraseña incorrecta.',
      'auth/invalid-credential':     'Correo o contraseña incorrectos.',
      'auth/email-already-in-use':   'Ese correo ya está registrado.',
      'auth/weak-password':          'La contraseña debe tener al menos 8 caracteres.',
      'auth/invalid-email':          'El correo no tiene un formato válido.',
      'auth/popup-closed-by-user':   'Cerraste la ventana antes de completar.',
      'auth/too-many-requests':      'Demasiados intentos. Intenta más tarde.',
      'auth/network-request-failed': 'Sin conexión. Revisa tu internet.',
    };
    return map[code] || 'Ocurrió un error. Intenta de nuevo.';
  }

  async function handleAuthSubmit(btn, fn) {
    clearAlerts();
    setLoading(btn, true);
    try {
      await fn();
    } catch (err) {
      showAlert(firebaseErrMsg(err.code), 'err');
      setLoading(btn, false);
    }
  }

  document.getElementById('form-login').addEventListener('submit', e => {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    const pw    = document.getElementById('login-pw').value;
    if (!email || !pw) { showAlert('Completa todos los campos.', 'err'); return; }
    handleAuthSubmit(e.submitter, () => signInWithEmailAndPassword(auth, email, pw));
  });

  document.getElementById('form-register').addEventListener('submit', e => {
    e.preventDefault();
    const name  = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const pw    = document.getElementById('reg-pw').value;
    if (!name || !email || !pw) { showAlert('Completa todos los campos.', 'err'); return; }
    if (pw.length < 8) { showAlert('La contraseña debe tener al menos 8 caracteres.', 'err'); return; }
    handleAuthSubmit(e.submitter, async () => {
      const cred = await createUserWithEmailAndPassword(auth, email, pw);
      await updateProfile(cred.user, { displayName: name });
    });
  });

  window.loginGoogle = async () => {
    clearAlerts();
    try {
      await signInWithPopup(auth, gProvider);
    } catch (err) {
      if (err.code !== 'auth/popup-closed-by-user') showAlert(firebaseErrMsg(err.code), 'err');
    }
  };

  window.handleForgot = async e => {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    if (!email) { showAlert('Escribe tu correo arriba para recuperar tu contraseña.', 'err'); return; }
    try {
      await sendPasswordResetEmail(auth, email);
      showAlert('Te enviamos un correo para restablecer tu contraseña.', 'ok');
    } catch (err) {
      showAlert(firebaseErrMsg(err.code), 'err');
    }
  };

  window.switchTab = (tab) => {
    document.querySelectorAll('.tab').forEach(t =>
      t.classList.toggle('active', t.dataset.tab === tab)
    );
    document.getElementById('panel-login').classList.toggle('active', tab === 'login');
    document.getElementById('panel-register').classList.toggle('active', tab === 'register');
    clearAlerts();
  };

  window.togglePw = (inputId, btn) => {
    const input = document.getElementById(inputId);
    const isText = input.type === 'text';
    input.type = isText ? 'password' : 'text';
    btn.setAttribute('aria-pressed', String(!isText));
  };
</script>

</body>
</html>
