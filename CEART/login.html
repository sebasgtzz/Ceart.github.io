<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="theme-color" content="#ffbb08"/>
  <meta name="description" content="Accede a tu portal de alumno en CEART — Centro Educativo y Artístico Johann Sebastian Bach."/>
  <meta property="og:title" content="Acceder — CEART"/>
  <meta property="og:description" content="Inicia sesión o crea tu cuenta en el portal de alumnos de CEART."/>
  <meta property="og:type" content="website"/>
  <meta property="og:image" content="assets/logo.jpg"/>
  <title>Acceder — CEART</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" href="assets/logo.jpg" type="image/jpeg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800;900&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --gold:#ffbb08;--gold-d:#c99500;--gold-l:rgba(255,187,8,.1);
      --ink:#0c0b09;--muted:#686560;--border:rgba(0,0,0,.1);
      --white:#fff;--off:#f9f8f5;--r:16px;
      --err:#dc2626;--suc:#16a34a;
      --ease:cubic-bezier(.16,1,.3,1);
    }
    body{font-family:'Nunito',sans-serif;background:var(--off);min-height:100dvh;display:flex;flex-direction:column}

    /* HEADER */
    header{padding:20px 24px;display:flex;align-items:center;justify-content:space-between}
    .back{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--muted);font-size:13px;font-weight:600;transition:color .2s var(--ease)}
    .back:hover{color:var(--ink)}
    .back svg{width:16px;height:16px;transition:transform .2s var(--ease)}
    .back:hover svg{transform:translateX(-2px)}
    .hdr-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
    .hdr-logo img{height:32px;object-fit:contain;border-radius:6px}
    .hdr-logo span{font-family:'Raleway',sans-serif;font-size:15px;font-weight:800;color:var(--ink)}

    /* MAIN */
    main{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:var(--white);border-radius:24px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 8px 48px rgba(180,120,0,.1),0 1px 2px rgba(0,0,0,.06)}

    /* CARD HEADER */
    .card-logo{width:64px;height:64px;background:var(--ink);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
    .card-logo img{width:46px;height:46px;object-fit:contain;border-radius:8px}
    h1{font-family:'Raleway',sans-serif;font-size:28px;font-weight:900;text-align:center;color:var(--ink);margin-bottom:6px;letter-spacing:-.5px}
    .card-sub{font-size:14px;color:var(--muted);text-align:center;margin-bottom:32px;font-weight:500}

    /* TABS */
    .tabs{display:flex;background:var(--off);border-radius:12px;padding:4px;margin-bottom:28px;gap:4px}
    .tab{flex:1;text-align:center;padding:9px;border-radius:9px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;border:none;background:transparent;font-family:'Nunito',sans-serif;transition:all .2s var(--ease)}
    .tab.active{background:var(--white);color:var(--ink);box-shadow:0 1px 6px rgba(0,0,0,.08)}
    .tab:not(.active):hover{color:var(--ink)}

    /* FORM */
    .form-panel{display:none}
    .form-panel.active{display:block}
    .field{margin-bottom:18px}
    label{display:block;font-size:12px;font-weight:700;color:var(--ink);margin-bottom:7px;letter-spacing:.3px}
    input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:var(--r);font-size:15px;font-family:'Nunito',sans-serif;color:var(--ink);background:var(--white);transition:border-color .2s var(--ease),box-shadow .2s var(--ease);outline:none}
    input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(255,187,8,.15)}
    input.error{border-color:var(--err)}
    input::placeholder{color:rgba(104,101,96,.45)}
    .field-err{font-size:12px;color:var(--err);margin-top:5px;display:none;font-weight:600}
    .field-err.show{display:block}
    .forgot{display:block;text-align:right;font-size:12px;color:var(--muted);text-decoration:none;margin-top:-10px;margin-bottom:18px;transition:color .2s;font-weight:600}
    .forgot:hover{color:var(--ink)}

    /* BUTTONS */
    .btn-submit{width:100%;padding:14px;background:var(--ink);color:var(--white);border:none;border-radius:50px;font-size:15px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s var(--ease);margin-bottom:16px;position:relative}
    .btn-submit:hover{background:#2a2a28;transform:translateY(-1px);box-shadow:0 4px 18px rgba(0,0,0,.22)}
    .btn-submit:active{transform:scale(.97);box-shadow:none}
    .btn-submit:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}
    .btn-google{width:100%;padding:13px;background:var(--white);color:var(--ink);border:1.5px solid var(--border);border-radius:50px;font-size:14px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s var(--ease);display:flex;align-items:center;justify-content:center;gap:10px}
    .btn-google:hover{border-color:#999;box-shadow:0 2px 10px rgba(0,0,0,.09)}
    .btn-google:active{transform:scale(.97)}
    .btn-google svg{width:18px;height:18px;flex-shrink:0}

    /* DIVIDER */
    .divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--muted);font-size:12px;font-weight:600}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

    /* ALERT */
    .alert{padding:12px 16px;border-radius:var(--r);font-size:13px;font-weight:600;margin-bottom:18px;display:none;align-items:flex-start;gap:10px}
    .alert.show{display:flex}
    .alert-err{background:#fef2f2;color:var(--err);border:1px solid #fecaca}
    .alert-ok{background:#f0fdf4;color:var(--suc);border:1px solid #bbf7d0}

    /* SPINNER */
    .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:var(--white);border-radius:50%;animation:spin .7s linear infinite;display:none;margin:0 auto}
    .btn-submit.loading .spinner{display:block}
    .btn-submit.loading .btn-text{display:none}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* PASSWORD TOGGLE */
    .pw-wrap{position:relative}
    .pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;display:flex;transition:color .15s,opacity .15s}
    .pw-toggle:hover{color:var(--ink)}
    .pw-toggle[aria-pressed="true"]{opacity:1}
    .pw-toggle[aria-pressed="false"]{opacity:.45}
    .pw-wrap input{padding-right:44px}

    /* CARD ENTER ANIMATION */
    .card{animation:card-in .5s cubic-bezier(.16,1,.3,1) both}
    @keyframes card-in{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

    /* FOOTER */
    footer{text-align:center;padding:20px;font-size:12px;color:var(--muted);font-weight:500}
    footer a{color:var(--muted);text-decoration:none;font-weight:600}
    footer a:hover{color:var(--ink)}

    @media(max-width:480px){
      .card{padding:32px 24px;border-radius:20px}
      h1{font-size:24px}
    }

    /* FOCUS */
    :focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:4px}

    /* REDUCED MOTION */
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
    }
  </style>
</head>
<body>
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <symbol id="icon-google" viewBox="0 0 24 24">
    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
  </symbol>
</svg>

<header>
  <a href="index.html" class="back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Volver
  </a>
  <a href="index.html" class="hdr-logo">
    <img src="assets/logo.jpg" alt="CEART"/>
    <span>CEART</span>
  </a>
</header>

<main>
  <div class="card">
    <div class="card-logo">
      <img src="assets/logo.jpg" alt="CEART"/>
    </div>
    <h1>Bienvenido</h1>
    <p class="card-sub">Accede a tu portal de CEART</p>

    <div class="tabs" role="tablist">
      <button class="tab active" role="tab" data-tab="login" onclick="switchTab('login')">Iniciar sesión</button>
      <button class="tab" role="tab" data-tab="register" onclick="switchTab('register')">Registrarse</button>
    </div>

    <div id="alert" class="alert alert-err" role="alert">
      <span id="alert-msg"></span>
    </div>
    <div id="alert-ok" class="alert alert-ok" role="status">
      <span id="alert-ok-msg"></span>
    </div>

    <!-- LOGIN PANEL -->
    <div id="panel-login" class="form-panel active">
      <form id="form-login" novalidate>
        <div class="field">
          <label for="login-email">Correo electrónico</label>
          <input type="email" id="login-email" placeholder="tu@correo.com" autocomplete="email" required/>
          <span class="field-err" id="err-login-email"></span>
        </div>
        <div class="field">
          <label for="login-pw">Contraseña</label>
          <div class="pw-wrap">
            <input type="password" id="login-pw" placeholder="Tu contraseña" autocomplete="current-password" required/>
            <button type="button" class="pw-toggle" onclick="togglePw('login-pw',this)" aria-label="Mostrar contraseña" aria-pressed="false">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span class="field-err" id="err-login-pw"></span>
        </div>
        <a href="#" class="forgot" onclick="handleForgot(event)">¿Olvidaste tu contraseña?</a>
        <button type="submit" class="btn-submit" id="btn-login">
          <span class="btn-text">Iniciar sesión</span>
          <div class="spinner"></div>
        </button>
      </form>

      <div class="divider">o continúa con</div>

      <button class="btn-google" onclick="loginGoogle()">
        <svg width="18" height="18"><use href="#icon-google"/></svg>
        Continuar con Google
      </button>
    </div>

    <!-- REGISTER PANEL -->
    <div id="panel-register" class="form-panel">
      <form id="form-register" novalidate>
        <div class="field">
          <label for="reg-name">Nombre completo</label>
          <input type="text" id="reg-name" placeholder="Juan García" autocomplete="name" required/>
          <span class="field-err" id="err-reg-name"></span>
        </div>
        <div class="field">
          <label for="reg-email">Correo electrónico</label>
          <input type="email" id="reg-email" placeholder="tu@correo.com" autocomplete="email" required/>
          <span class="field-err" id="err-reg-email"></span>
        </div>
        <div class="field">
          <label for="reg-pw">Contraseña</label>
          <div class="pw-wrap">
            <input type="password" id="reg-pw" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required minlength="8"/>
            <button type="button" class="pw-toggle" onclick="togglePw('reg-pw',this)" aria-label="Mostrar contraseña" aria-pressed="false">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span class="field-err" id="err-reg-pw"></span>
        </div>
        <button type="submit" class="btn-submit" id="btn-register">
          <span class="btn-text">Crear cuenta</span>
          <div class="spinner"></div>
        </button>
      </form>

      <div class="divider">o regístrate con</div>

      <button class="btn-google" onclick="loginGoogle()">
        <svg width="18" height="18"><use href="#icon-google"/></svg>
        Continuar con Google
      </button>
    </div>
  </div>
</main>

<footer>
  <p>Al continuar, aceptas los <a href="#">Términos de uso</a> de CEART.</p>
</footer>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import {
    getAuth,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    signInWithPopup,
    GoogleAuthProvider,
    sendPasswordResetEmail,
    updateProfile,
    onAuthStateChanged
  } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey:            "AIzaSyA2T-sgRasaOVjvFNogYJUp_PjfiIObkUs",
    authDomain:        "ceart-app.firebaseapp.com",
    projectId:         "ceart-app",
    storageBucket:     "ceart-app.firebasestorage.app",
    messagingSenderId: "510352925375",
    appId:             "1:510352925375:web:cca20fa3ee6cb795601c0a"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const gProvider = new GoogleAuthProvider();

  onAuthStateChanged(auth, user => {
    if (user) window.location.href = 'dashboard.html';
  });

  function showAlert(msg, type) {
    document.querySelectorAll('.alert').forEach(el => el.classList.remove('show'));
    if (type === 'err') {
      document.getElementById('alert-msg').textContent = msg;
      document.getElementById('alert').classList.add('show');
    } else if (type === 'ok') {
      document.getElementById('alert-ok-msg').textContent = msg;
      document.getElementById('alert-ok').classList.add('show');
    }
  }
  function clearAlerts() { showAlert('', null); }

  function setLoading(btn, on) {
    btn.classList.toggle('loading', on);
    btn.disabled = on;
  }

  function firebaseErrMsg(code) {
    const map = {
      'auth/user-not-found':         'No existe una cuenta con ese correo.',
      'auth/wrong-password':         'Contraseña incorrecta.',
      'auth/invalid-credential':     'Correo o contraseña incorrectos.',
      'auth/email-already-in-use':   'Ese correo ya está registrado.',
      'auth/weak-password':          'La contraseña debe tener al menos 8 caracteres.',
      'auth/invalid-email':          'El correo no tiene un formato válido.',
      'auth/popup-closed-by-user':   'Cerraste la ventana antes de completar.',
      'auth/too-many-requests':      'Demasiados intentos. Intenta más tarde.',
      'auth/network-request-failed': 'Sin conexión. Revisa tu internet.',
    };
    return map[code] || 'Ocurrió un error. Intenta de nuevo.';
  }

  async function handleAuthSubmit(btn, fn) {
    clearAlerts();
    setLoading(btn, true);
    try {
      await fn();
    } catch (err) {
      showAlert(firebaseErrMsg(err.code), 'err');
      setLoading(btn, false);
    }
  }

  document.getElementById('form-login').addEventListener('submit', e => {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    const pw    = document.getElementById('login-pw').value;
    if (!email || !pw) { showAlert('Completa todos los campos.', 'err'); return; }
    handleAuthSubmit(e.submitter, () => signInWithEmailAndPassword(auth, email, pw));
  });

  document.getElementById('form-register').addEventListener('submit', e => {
    e.preventDefault();
    const name  = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const pw    = document.getElementById('reg-pw').value;
    if (!name || !email || !pw) { showAlert('Completa todos los campos.', 'err'); return; }
    if (pw.length < 8) { showAlert('La contraseña debe tener al menos 8 caracteres.', 'err'); return; }
    handleAuthSubmit(e.submitter, async () => {
      const cred = await createUserWithEmailAndPassword(auth, email, pw);
      await updateProfile(cred.user, { displayName: name });
    });
  });

  window.loginGoogle = async () => {
    clearAlerts();
    try {
      await signInWithPopup(auth, gProvider);
    } catch (err) {
      if (err.code !== 'auth/popup-closed-by-user') showAlert(firebaseErrMsg(err.code), 'err');
    }
  };

  window.handleForgot = async e => {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    if (!email) { showAlert('Escribe tu correo arriba para recuperar tu contraseña.', 'err'); return; }
    try {
      await sendPasswordResetEmail(auth, email);
      showAlert('Te enviamos un correo para restablecer tu contraseña.', 'ok');
    } catch (err) {
      showAlert(firebaseErrMsg(err.code), 'err');
    }
  };

  window.switchTab = (tab) => {
    document.querySelectorAll('.tab').forEach(t =>
      t.classList.toggle('active', t.dataset.tab === tab)
    );
    document.getElementById('panel-login').classList.toggle('active', tab === 'login');
    document.getElementById('panel-register').classList.toggle('active', tab === 'register');
    clearAlerts();
  };

  window.togglePw = (inputId, btn) => {
    const input = document.getElementById(inputId);
    const isText = input.type === 'text';
    input.type = isText ? 'password' : 'text';
    btn.setAttribute('aria-pressed', String(!isText));
  };
</script>

</body>
</html>
